<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ org.name }} — Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="org-{{ org.slug }}">
    <div class="container" style="display:flex; align-items:center; justify-content:center; min-height:80vh;">
        <div class="card" style="max-width:380px; width:100%; text-align:center;">
            <h1 style="font-size:24px; margin-bottom:4px;">{{ org.name }}</h1>
            <p class="subtitle" style="margin-bottom:24px;">Team Scheduler</p>

            {% if error %}
            <div class="message message-error" style="margin-bottom:16px;">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/{{ org.slug }}/login">
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" autofocus
                           style="text-align:center; font-size:16px;">
                </div>
                <button type="submit" class="btn btn-primary">Enter</button>
            </form>

            <a href="/" style="display:inline-block; margin-top:16px; font-size:13px; color:#6b7280;">Back to all organizations</a>
        </div>
    </div>
</body>
</html>
